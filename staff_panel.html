<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAFF TERMINAL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --supreme-green: #00c853; --dark-bg: #050505; --card-bg: #111; }
        body { background: var(--dark-bg); color: white; font-family: sans-serif; }
        .glass-card { background: var(--card-bg); border: 1px solid #222; border-radius: 16px; padding: 15px; margin-bottom: 10px; }
        .btn-green { background: var(--supreme-green); color: black; font-weight: 800; border-radius: 10px; }
        .nav-tabs { border: none; background: #0a0a0a; padding: 10px; border-radius: 14px; margin-bottom: 20px; }
        .nav-link { color: #555; border: none !important; font-size: 0.8rem; font-weight: 700; }
        .nav-link.active { color: var(--supreme-green) !important; background: transparent !important; border-bottom: 2px solid var(--supreme-green) !important; }
        #login { height: 100vh; display: flex; align-items: center; justify-content: center; }
        input { background: #151515 !important; border: 1px solid #333 !important; color: white !important; }
    </style>
</head>
<body>
    <div id="login">
        <div class="glass-card text-center" style="width: 300px;">
            <h2 style="font-weight: 900; color: var(--supreme-green);">STAFF<br><span style="color:white; font-size: 0.8rem;">TERMINAL</span></h2>
            <input type="password" id="key" class="form-control text-center my-3" placeholder="ACCESS KEY">
            <button onclick="doLogin()" class="btn btn-green w-100 py-3">LOGIN</button>
            <div id="err" class="text-danger mt-2 small"></div>
        </div>
    </div>

    <div id="ui" style="display:none;" class="container py-3">
        <header class="d-flex justify-content-between mb-3">
            <h4>OPERATIONS</h4>
            <button onclick="location.reload()" class="btn btn-outline-danger btn-sm">EXIT</button>
        </header>

        <ul class="nav nav-tabs" role="tablist">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#sq">QUEUE</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#sact" onclick="refreshAct()">ACTIVATE</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#ssearch" onclick="refreshSearch()">SEARCH</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#saud">AUDIT</a></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="sq"><div id="sq-list"></div></div>
            <div class="tab-pane fade" id="sact"><div id="sact-list"></div></div>
            <div class="tab-pane fade" id="ssearch">
                <input type="text" id="sqry" class="form-control mb-3" placeholder="Search phone..." onkeyup="doSearch()">
                <div id="ss-list"></div>
            </div>
            <div class="tab-pane fade" id="saud">
                <div class="glass-card">
                    <h6 class="mb-3">SHIFT CALCULATOR</h6>
                    <input type="number" id="v1" class="form-control mb-2" placeholder="Start USD">
                    <input type="number" id="v2" class="form-control mb-2" placeholder="In USD">
                    <input type="number" id="v3" class="form-control mb-2" placeholder="Out USD">
                    <input type="number" id="v4" class="form-control mb-2" placeholder="Liabilities USD">
                    <input type="number" id="v5" class="form-control mb-2" placeholder="Staff Cash (SLSH)">
                    <button onclick="lockShift()" class="btn btn-green w-100">SUBMIT & SIGN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = "";
        async function doLogin() {
            const p = document.getElementById('key').value;
            const res = await fetch('/api/v1/user/auth-access', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phoneNumber: 'maamulka', password: p, mode: 'login', deviceId: 'STAFF_WEB'})
            });
            const d = await res.json();
            if(d.token) {
                token = "Bearer " + d.token;
                document.getElementById('login').style.display = 'none';
                document.getElementById('ui').style.display = 'block';
                fetchQueue();
            } else { document.getElementById('err').innerText = "DENIED"; }
        }

        async function fetchQueue() {
            const res = await fetch('/api/admin/transactions', {headers: {'Authorization': token}});
            const txs = await res.json();
            document.getElementById('sq-list').innerHTML = Object.entries(txs).reverse().map(([id, t]) =>
                t.status === 'PENDING' ? `
                <div class="glass-card d-flex justify-content-between align-items-center">
                    <div><b>$ \${t.amountUSD}</b><br><small>6\${t.userId?.slice(-8)}</small></div>
                    <button onclick="approve('\${id}')" class="btn btn-green btn-sm px-4">OK</button>
                </div>` : '').join('');
        }

        async function approve(id) {
            await fetch('/api/v1/queue/update-state', {
                method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': token},
                body: JSON.stringify({transactionId: id, status: 'APPROVED'})
            });
            fetchQueue();
        }

        async function refreshAct() {
            const res = await fetch('/api/admin/all-users', {headers: {'Authorization': token}});
            const users = await res.json();
            document.getElementById('sact-list').innerHTML = Object.entries(users).filter(u => u[1].status === 'PENDING').map(([ph, u]) => `
                <div class="glass-card d-flex justify-content-between align-items-center">
                    <b>6\${ph.slice(-8)}</b>
                    <button onclick="actUser('\${ph}')" class="btn btn-green btn-sm">ACTIVATE</button>
                </div>`).join('');
        }

        async function actUser(ph) { await fetch('/api/admin/user/activate', {method:'POST', headers:{'Authorization':token,'Content-Type':'application/json'}, body:JSON.stringify({targetPhone:ph})}); refreshAct(); }
        async function lockShift() { alert('Shift Letter Signed & Sent'); location.reload(); }

        setInterval(() => { if(token) fetchQueue(); }, 30000);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
